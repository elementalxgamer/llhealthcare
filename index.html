<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeline Healthcare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💊 Lifeline Healthcare</h1>
    <p>Your Trusted Online Medicine Store</p>

    <input
        type="text"
        id="searchBar"
        placeholder="Search medicines..."
    >
</header>

<section>
    <h2>💊 Medicines</h2>

    <div id="medicineContainer">
        <!-- Medicines will be loaded here -->
    </div>
</section>

<section id="cart">
    <h2>🛒 Cart</h2>

    <ul id="cartItems"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>
</section>

<section id="bill">
    <h2>🧾 Bill Summary</h2>

    <div id="billDetails">
        No items added yet.
    </div>

    <h3>Subtotal: ₹<span id="subtotal">0</span></h3>
    <h3>GST (5%): ₹<span id="gst">0</span></h3>
    <h2>Grand Total: ₹<span id="grandTotal">0</span></h2>
</section>

<section id="order">
    <h2>📦 Order Details</h2>

    <input
        type="text"
        id="name"
        placeholder="Full Name"
    >

    <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
    >

    <textarea
        id="address"
        rows="4"
        placeholder="Enter Full Address"
    ></textarea>

    <h3>💳 Payment Method</h3>

    <select id="payment">
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>Google Pay</option>
        <option>PhonePe</option>
        <option>Paytm</option>
    </select>

    <button onclick="placeOrder()">
        Place Order
    </button>
</section>

<section id="location">
    <h2>📍 Store Location</h2>

    <iframe
        src="https://maps.google.com/maps?q=india&t=&z=13&ie=UTF8&iwloc=&output=embed"
        width="100%"
        height="300"
        style="border:0;"
        loading="lazy">
    </iframe>
</section>

<footer>
    <p>© 2026 Lifeline Healthcare</p>
</footer>

<script src="script.js"></script>

</body>
</html>
